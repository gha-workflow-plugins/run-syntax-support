name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
version-template: "$MAJOR.$MINOR"
tag-prefix: "v"

categories:
  - title: "Breaking Changes"
    labels:
      - "major"
      - "breaking-change"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
      - "minor"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
      - "bugfix"
  - title: "Maintenance"
    labels:
      - "chore"
      - "maintenance"
      - "dependencies"
  - title: "Documentation"
    labels:
      - "documentation"
      - "docs"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

exclude-labels:
  - "skip-changelog"

version-resolver:
  major:
    labels:
      - "major"
      - "breaking-change"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  default: minor

template: |
  ## Changes

  $CHANGES
